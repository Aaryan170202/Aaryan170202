<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="240" viewBox="0 0 1200 240" role="img" aria-label="Contact: Let's build something that understands people. Channel open — replies come from a human.">
<title>aaryan.sys — open channel</title>
<defs>
  <linearGradient id="cwin" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#0d1117"/><stop offset="100%" stop-color="#161b22"/>
  </linearGradient>
  <linearGradient id="cacc" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#00ff99"/><stop offset="50%" stop-color="#58a6ff"/><stop offset="100%" stop-color="#ff4d8d"/>
  </linearGradient>
  <linearGradient id="csheen" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#fff" stop-opacity="0"/>
    <stop offset="50%" stop-color="#ffffff" stop-opacity=".8"/>
    <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
  </linearGradient>
  <filter id="cshadow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="5" stdDeviation="8" flood-color="#000" flood-opacity=".45"/>
  </filter>
  <clipPath id="headclip">
    <text x="600" y="140" text-anchor="middle" font-family="'Segoe UI',system-ui,-apple-system,'Helvetica Neue',Arial,sans-serif" font-size="30" font-weight="700">Let's build something that understands people.</text>
  </clipPath>
  <style>
    .mono{font-family:ui-monospace,'Cascadia Code','JetBrains Mono','Fira Code',Consolas,'Liberation Mono',Menlo,monospace}
    .ui{font-family:'Segoe UI',system-ui,-apple-system,'Helvetica Neue',Arial,sans-serif}
    .dim{fill:#8b949e}
    .reveal{animation:fadeup .5s cubic-bezier(.2,.7,.3,1) both}
    @keyframes fadeup{from{opacity:0;transform:translateY(9px)}}
    .pulse{animation:pulse 2s ease-in-out infinite}
    @keyframes pulse{50%{opacity:.3}}
    .sweep{animation:sweep 5.5s ease-in-out 1.4s infinite}
    @keyframes sweep{0%{transform:translateX(0)}36%{transform:translateX(1050px)}100%{transform:translateX(1050px)}}
    @media (prefers-reduced-motion:reduce){*{animation:none!important}}
  </style>
</defs>

<rect x="10" y="10" width="1180" height="220" rx="16" fill="url(#cwin)" stroke="#30363d" stroke-width="1.5" filter="url(#cshadow)"/>
<line x1="10" y1="58" x2="1190" y2="58" stroke="#30363d" stroke-width="1.5"/>
<circle cx="40" cy="34" r="6.5" fill="#ff5f57"/>
<circle cx="64" cy="34" r="6.5" fill="#febc2e"/>
<circle cx="88" cy="34" r="6.5" fill="#28c840"/>
<text x="600" y="39" text-anchor="middle" class="mono dim" font-size="14">aaryan@sys: ~ $ ./connect --any-channel</text>

<text class="reveal mono dim" style="animation-delay:.1s" x="600" y="94" text-anchor="middle" font-size="11.5" letter-spacing="3">OPEN CHANNEL</text>

<g class="reveal" style="animation-delay:.25s">
  <text x="600" y="140" text-anchor="middle" class="ui" font-size="30" font-weight="700" fill="url(#cacc)">Let's build something that understands people.</text>
  <g clip-path="url(#headclip)">
    <g class="sweep"><rect x="-460" y="108" width="200" height="44" fill="url(#csheen)" transform="skewX(-18)"/></g>
  </g>
</g>

<text class="reveal mono" style="animation-delay:.4s" x="600" y="176" text-anchor="middle" font-size="13" fill="#c9d1d9">product builds · ai agents · backend rescues · honest conversations</text>

<text class="reveal mono" style="animation-delay:.55s" x="600" y="208" text-anchor="middle" font-size="12" fill="#8b949e"><tspan class="pulse" fill="#ff4d8d">●</tspan>  channel: open — replies come from a human, usually fast</text>
</svg>
