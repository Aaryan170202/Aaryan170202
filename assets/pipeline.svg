<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="470" viewBox="0 0 1200 470" role="img" aria-label="Nocaps AMORE pipeline: a user talks to AMORE-1, the conversational agent. AMORE-2 turns conversation into 53 behavioral signals and 12 compatibility dimensions. AMORE NET matches people and explains why, producing a compatibility report that feeds back to the user.">
<title>Nocaps — AMORE agent pipeline</title>
<defs>
  <linearGradient id="pwin" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#0d1117"/><stop offset="100%" stop-color="#161b22"/>
  </linearGradient>
  <linearGradient id="pacc" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#00ff99"/><stop offset="100%" stop-color="#58a6ff"/>
  </linearGradient>
  <linearGradient id="pink" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#ff4d8d"/><stop offset="100%" stop-color="#58a6ff"/>
  </linearGradient>
  <filter id="pshadow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="5" stdDeviation="8" flood-color="#000" flood-opacity=".45"/>
  </filter>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M0 0L10 5L0 10z" fill="#58a6ff"/>
  </marker>
  <marker id="arrowpink" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M0 0L10 5L0 10z" fill="#ff4d8d"/>
  </marker>
  <style>
    .mono{font-family:ui-monospace,'Cascadia Code','JetBrains Mono','Fira Code',Consolas,'Liberation Mono',Menlo,monospace}
    .ui{font-family:'Segoe UI',system-ui,-apple-system,'Helvetica Neue',Arial,sans-serif}
    .dim{fill:#8b949e}.txt{fill:#c9d1d9}

    .reveal{animation:fadeup .5s cubic-bezier(.2,.7,.3,1) both}
    @keyframes fadeup{from{opacity:0;transform:translateY(9px)}}
    .pop{animation:pop .14s linear both}
    @keyframes pop{from{opacity:0}}

    .march{stroke-dasharray:5 9}
    .dot,.glow{opacity:0}
    @media (prefers-reduced-motion:no-preference){
      .march{animation:march 2.6s linear infinite}
      @keyframes march{to{stroke-dashoffset:-56}}
      .dot{opacity:.95}.glow{opacity:.28}
      .blink{animation:blink 1s steps(1,end) infinite}
      @keyframes blink{0%,55%{opacity:1}56%,100%{opacity:0}}
    }
    @media (prefers-reduced-motion:reduce){.reveal,.pop{animation:none!important}}
  </style>
</defs>

<!-- window -->
<rect x="10" y="10" width="1180" height="450" rx="16" fill="url(#pwin)" stroke="#30363d" stroke-width="1.5" filter="url(#pshadow)"/>
<line x1="10" y1="58" x2="1190" y2="58" stroke="#30363d" stroke-width="1.5"/>
<circle cx="40" cy="34" r="6.5" fill="#ff5f57"/>
<circle cx="64" cy="34" r="6.5" fill="#febc2e"/>
<circle cx="88" cy="34" r="6.5" fill="#28c840"/>
<text x="600" y="39" text-anchor="middle" class="mono dim" font-size="14">aaryan@sys: ~/nocaps $ ./amore --trace</text>

<!-- legend chips -->
<g class="mono" font-size="11.5">
  <g class="pop" style="animation-delay:.15s">
    <rect x="44" y="74" width="92" height="24" rx="12" fill="#161b22" stroke="#30363d"/>
    <text x="90" y="90" text-anchor="middle" class="txt">agents: <tspan fill="#00ff99">3</tspan></text>
  </g>
  <g class="pop" style="animation-delay:.3s">
    <rect x="146" y="74" width="102" height="24" rx="12" fill="#161b22" stroke="#30363d"/>
    <text x="197" y="90" text-anchor="middle" class="txt">signals: <tspan fill="#00ff99">53</tspan></text>
  </g>
  <g class="pop" style="animation-delay:.45s">
    <rect x="258" y="74" width="88" height="24" rx="12" fill="#161b22" stroke="#30363d"/>
    <text x="302" y="90" text-anchor="middle" class="txt">dims: <tspan fill="#00ff99">12</tspan></text>
  </g>
  <g class="pop" style="animation-delay:.6s">
    <rect x="356" y="74" width="150" height="24" rx="12" fill="#161b22" stroke="#30363d"/>
    <text x="431" y="90" text-anchor="middle" class="txt">mode: <tspan fill="#58a6ff">conversation</tspan></text>
  </g>
</g>

<!-- connectors -->
<g fill="none" stroke-width="1.6">
  <path d="M222 178 H268" stroke="#30363d"/>
  <path class="march" d="M222 178 H268" stroke="url(#pacc)" marker-end="url(#arrow)"/>
  <path d="M522 178 H568" stroke="#30363d"/>
  <path class="march" d="M522 178 H568" stroke="url(#pacc)" marker-end="url(#arrow)"/>
  <path d="M846 178 H892" stroke="#30363d"/>
  <path class="march" d="M846 178 H892" stroke="url(#pacc)" marker-end="url(#arrow)"/>
  <path d="M1030 244 V290" stroke="#30363d"/>
  <path class="march" d="M1030 244 V290" stroke="url(#pacc)" marker-end="url(#arrow)"/>
  <path d="M300 336 C180 336 132 302 132 252" stroke="#30363d"/>
  <path class="march" d="M300 336 C180 336 132 302 132 252" stroke="#ff4d8d" stroke-opacity=".85" marker-end="url(#arrowpink)"/>
</g>
<text x="196" y="384" class="mono" font-size="10.5" fill="#8b949e">refines with every signal</text>

<!-- flowing packets -->
<g>
  <circle class="glow" r="7" fill="#00ff99"><animateMotion dur="1.7s" begin="0s" repeatCount="indefinite" path="M222 178 H268"/></circle>
  <circle class="dot" r="3.4" fill="#9fffd8"><animateMotion dur="1.7s" begin="0s" repeatCount="indefinite" path="M222 178 H268"/></circle>
  <circle class="glow" r="7" fill="#00ff99"><animateMotion dur="1.7s" begin=".55s" repeatCount="indefinite" path="M522 178 H568"/></circle>
  <circle class="dot" r="3.4" fill="#9fffd8"><animateMotion dur="1.7s" begin=".55s" repeatCount="indefinite" path="M522 178 H568"/></circle>
  <circle class="glow" r="7" fill="#58a6ff"><animateMotion dur="1.7s" begin="1.1s" repeatCount="indefinite" path="M846 178 H892"/></circle>
  <circle class="dot" r="3.4" fill="#bcd8ff"><animateMotion dur="1.7s" begin="1.1s" repeatCount="indefinite" path="M846 178 H892"/></circle>
  <circle class="glow" r="7" fill="#58a6ff"><animateMotion dur="1.7s" begin="1.4s" repeatCount="indefinite" path="M1030 244 V290"/></circle>
  <circle class="dot" r="3.4" fill="#bcd8ff"><animateMotion dur="1.7s" begin="1.4s" repeatCount="indefinite" path="M1030 244 V290"/></circle>
  <circle class="glow" r="7" fill="#ff4d8d"><animateMotion dur="2.6s" begin=".8s" repeatCount="indefinite" path="M300 336 C180 336 132 302 132 252"/></circle>
  <circle class="dot" r="3.4" fill="#ffb3cf"><animateMotion dur="2.6s" begin=".8s" repeatCount="indefinite" path="M300 336 C180 336 132 302 132 252"/></circle>
</g>

<!-- USER node -->
<g class="reveal" style="animation-delay:.2s">
  <rect x="48" y="112" width="168" height="132" rx="13" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <rect x="48" y="112" width="3.5" height="132" rx="1.75" fill="url(#pink)"/>
  <circle cx="132" cy="152" r="13" fill="none" stroke="#ff4d8d" stroke-width="2.4"/>
  <path d="M107 190 a25 15 0 0 1 50 0" fill="none" stroke="#ff4d8d" stroke-width="2.4"/>
  <text x="132" y="214" text-anchor="middle" class="mono" font-size="14" font-weight="700" fill="#ffffff">USER</text>
  <text x="132" y="231" text-anchor="middle" class="mono dim" font-size="10.5">just talks — no quizzes</text>
</g>

<!-- AMORE-1 -->
<g class="reveal" style="animation-delay:.35s">
  <rect x="272" y="112" width="246" height="132" rx="13" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <rect x="272" y="112" width="3.5" height="132" rx="1.75" fill="url(#pacc)"/>
  <text x="294" y="142" class="mono" font-size="15" font-weight="700" fill="#ffffff">AMORE-1</text>
  <text x="294" y="159" class="mono dim" font-size="9.5" letter-spacing="1.6">CONVERSATIONAL AI</text>
  <text x="294" y="186" class="ui txt" font-size="12.5"><tspan fill="#00ff99">▸</tspan> talks like a person, not a form</text>
  <text x="294" y="207" class="ui txt" font-size="12.5"><tspan fill="#00ff99">▸</tspan> learns personality in context</text>
  <text x="294" y="228" class="ui txt" font-size="12.5"><tspan fill="#00ff99">▸</tspan> harvests compatibility signals</text>
</g>

<!-- AMORE-2 -->
<g class="reveal" style="animation-delay:.5s">
  <rect x="572" y="112" width="270" height="132" rx="13" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <rect x="572" y="112" width="3.5" height="132" rx="1.75" fill="url(#pacc)"/>
  <text x="594" y="142" class="mono" font-size="15" font-weight="700" fill="#ffffff">AMORE-2</text>
  <text x="594" y="159" class="mono dim" font-size="9.5" letter-spacing="1.6">BEHAVIOR INTELLIGENCE</text>
  <text x="594" y="186" class="ui txt" font-size="12.5"><tspan fill="#00ff99">▸</tspan> 53 signals → embeddings</text>
  <text x="594" y="207" class="ui txt" font-size="12.5"><tspan fill="#00ff99">▸</tspan> scores 12 compatibility dims</text>
  <text x="594" y="228" class="ui txt" font-size="12.5"><tspan fill="#00ff99">▸</tspan> detects attachment styles</text>
</g>

<!-- AMORE NET -->
<g class="reveal" style="animation-delay:.65s">
  <rect x="896" y="112" width="260" height="132" rx="13" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <rect x="896" y="112" width="3.5" height="132" rx="1.75" fill="url(#pacc)"/>
  <text x="918" y="142" class="mono" font-size="15" font-weight="700" fill="#ffffff">AMORE NET</text>
  <text x="918" y="159" class="mono dim" font-size="9.5" letter-spacing="1.6">COMPATIBILITY ENGINE</text>
  <text x="918" y="186" class="ui txt" font-size="12.5"><tspan fill="#00ff99">▸</tspan> matches compatible people</text>
  <text x="918" y="207" class="ui txt" font-size="12.5"><tspan fill="#00ff99">▸</tspan> explains the <tspan font-style="italic">why</tspan>, not just who</text>
  <text x="918" y="228" class="ui txt" font-size="12.5"><tspan fill="#00ff99">▸</tspan> writes the full report</text>
</g>

<!-- report bar -->
<g class="reveal" style="animation-delay:.85s">
  <rect x="300" y="298" width="856" height="76" rx="13" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <rect x="300" y="298" width="856" height="3.5" rx="1.75" fill="url(#pink)"/>
  <path d="M348 328 c-5-6-15-4-15 4 0 7 10 12 15 16 5-4 15-9 15-16 0-8-10-10-15-4z" fill="#ff4d8d"/>
  <text x="382" y="332" class="ui" font-size="16.5" font-weight="700" fill="#ffffff">MATCH + COMPATIBILITY REPORT</text>
  <text x="382" y="354" class="ui dim" font-size="12.5">not just <tspan fill="#c9d1d9">who</tspan> you match with — <tspan fill="#c9d1d9">why</tspan> it would work</text>
  <text x="1130" y="342" text-anchor="end" class="mono" font-size="12" fill="#00ff99">output: human connection</text>
</g>

<!-- tech strip -->
<text class="pop mono" style="animation-delay:1.1s" x="600" y="432" text-anchor="middle" font-size="12.5" fill="#8b949e">react-native · flask · python · postgresql · supabase · redis · firebase-auth · grok · qwen</text>
</svg>
