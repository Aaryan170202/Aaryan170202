<stop offset="0%" stop-color="#0d1117"/><stop offset="100%" stop-color="#161b22"/>
</linearGradient>
<linearGradient id="g" x1="0" y1="0" x2="1" y2="0">
<stop offset="0%" stop-color="#00ff99"/><stop offset="100%" stop-color="#58a6ff"/>
</linearGradient>
<style>
.title{font:700 22px 'Segoe UI';fill:#fff}
.label{font:18px 'Segoe UI';fill:#c9d1d9}
.small{font:16px 'Segoe UI';fill:#8b949e}
</style>
</defs>

<rect width="1200" height="620" fill="#0d1117"/>
<rect x="40" y="40" width="1120" height="540" rx="18" fill="url(#bg)" stroke="#30363d" stroke-width="2"/>
<line x1="40" y1="88" x2="1160" y2="88" stroke="#30363d"/>
<circle cx="70" cy="64" r="7" fill="#ff5f57"/>
<circle cx="95" cy="64" r="7" fill="#febc2e"/>
<circle cx="120" cy="64" r="7" fill="#28c840"/>
