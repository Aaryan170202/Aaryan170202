<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="180" viewBox="0 0 1200 180">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
<stop offset="0%" stop-color="#0d1117"/>
<stop offset="100%" stop-color="#161b22"/>
</linearGradient>
<linearGradient id="g" x1="0" y1="0" x2="1" y2="0">
<stop offset="0%" stop-color="#00ff99"/>
<stop offset="100%" stop-color="#58a6ff"/>
</linearGradient>
</defs>

<rect width="1200" height="180" rx="18" fill="url(#bg)"/>
<rect x="20" y="20" width="1160" height="140" rx="14" fill="none" stroke="#30363d" stroke-width="2"/>

<circle cx="50" cy="45" r="7" fill="#ff5f57"/>
<circle cx="75" cy="45" r="7" fill="#febc2e"/>
<circle cx="100" cy="45" r="7" fill="#28c840"/>

<text x="600" y="60" text-anchor="middle"
font-family="Segoe UI"
font-size="18"
fill="#8b949e">
SYSTEM ONLINE
</text>

<text x="600" y="105"
text-anchor="middle"
font-family="Segoe UI"
font-size="28"
font-weight="700"
fill="url(#g)">
Thanks for visiting.
</text>

<text x="600" y="135"
text-anchor="middle"
font-family="Consolas, monospace"
font-size="16"
fill="#c9d1d9">
&gt; exit --save-session
</text>

<text x="600" y="155"
text-anchor="middle"
font-family="Consolas, monospace"
font-size="14"
fill="#8b949e">
Session terminated successfully.
</text>

</svg>
