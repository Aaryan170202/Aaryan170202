<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="170" viewBox="0 0 1200 170" role="img" aria-label="Session saved. Thanks for visiting — come back when it ships.">
<title>aaryan.sys — session saved</title>
<defs>
  <linearGradient id="fwin" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#0d1117"/><stop offset="100%" stop-color="#161b22"/>
  </linearGradient>
  <linearGradient id="ekg" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#ff4d8d"/><stop offset="100%" stop-color="#58a6ff"/>
  </linearGradient>
  <filter id="fshadow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="5" stdDeviation="8" flood-color="#000" flood-opacity=".45"/>
  </filter>
  <style>
    .mono{font-family:ui-monospace,'Cascadia Code','JetBrains Mono','Fira Code',Consolas,'Liberation Mono',Menlo,monospace}
    .ui{font-family:'Segoe UI',system-ui,-apple-system,'Helvetica Neue',Arial,sans-serif}
    .dim{fill:#8b949e}
    .reveal{animation:fadeup .5s cubic-bezier(.2,.7,.3,1) both}
    @keyframes fadeup{from{opacity:0;transform:translateY(8px)}}
    .blink{animation:blink 1s steps(1,end) infinite}
    @keyframes blink{0%,55%{opacity:1}56%,100%{opacity:0}}
    .beat{stroke-dasharray:560 560}
    @media (prefers-reduced-motion:no-preference){
      .beat{animation:beat 3.4s linear infinite}
      @keyframes beat{from{stroke-dashoffset:560}to{stroke-dashoffset:-560}}
    }
    @media (prefers-reduced-motion:reduce){.reveal{animation:none!important}.blink{animation:none!important}}
  </style>
</defs>

<rect x="10" y="10" width="1180" height="150" rx="16" fill="url(#fwin)" stroke="#30363d" stroke-width="1.5" filter="url(#fshadow)"/>
<line x1="10" y1="58" x2="1190" y2="58" stroke="#30363d" stroke-width="1.5"/>
<circle cx="40" cy="34" r="6.5" fill="#ff5f57"/>
<circle cx="64" cy="34" r="6.5" fill="#febc2e"/>
<circle cx="88" cy="34" r="6.5" fill="#28c840"/>
<text x="600" y="39" text-anchor="middle" class="mono dim" font-size="14">aaryan@sys: ~ $ exit</text>

<text class="reveal mono" style="animation-delay:.1s" x="44" y="92" font-size="14" fill="#00ff99">&gt; session saved ✓</text>
<text class="reveal ui" style="animation-delay:.25s" x="44" y="121" font-size="20" font-weight="600" fill="#ffffff">Thanks for visiting — come back when it ships.</text>
<text class="reveal mono dim" style="animation-delay:.4s" x="44" y="146" font-size="13" xml:space="preserve">guest@aaryan.sys:~$ </text>
<rect class="blink" x="202" y="134" width="8" height="14" fill="#00ff99"/>

<path class="beat" d="M770 108 h58 l9 -24 l11 42 l9 -18 h44 l9 -24 l11 42 l9 -18 h58 l9 -24 l11 42 l9 -18 h50"
  fill="none" stroke="url(#ekg)" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
<text x="960" y="142" text-anchor="middle" class="mono" font-size="11" fill="#8b949e"><tspan fill="#ff4d8d">♥</tspan> nocaps — always on</text>
</svg>
