<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="32" viewBox="0 0 1200 32" role="img" aria-label="Section divider">
<defs>
  <linearGradient id="rail" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#00ff99" stop-opacity="0"/>
    <stop offset="18%" stop-color="#00ff99" stop-opacity=".85"/>
    <stop offset="50%" stop-color="#58a6ff"/>
    <stop offset="82%" stop-color="#00ff99" stop-opacity=".85"/>
    <stop offset="100%" stop-color="#00ff99" stop-opacity="0"/>
  </linearGradient>
  <linearGradient id="trail" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#58a6ff" stop-opacity="0"/>
    <stop offset="100%" stop-color="#9fffd8" stop-opacity=".9"/>
  </linearGradient>
  <style>
    .traveler{opacity:0}
    @media (prefers-reduced-motion:no-preference){
      .traveler{opacity:1;animation:travel 4.5s linear infinite}
      @keyframes travel{from{transform:translateX(0)}to{transform:translateX(1080px)}}
      .node{animation:breathe 2.6s ease-in-out infinite}
      @keyframes breathe{50%{opacity:.45}}
    }
  </style>
</defs>
<line x1="40" y1="16" x2="1160" y2="16" stroke="url(#rail)" stroke-width="1.5"/>
<g class="traveler">
  <rect x="12" y="15.2" width="36" height="1.6" fill="url(#trail)"/>
  <circle cx="48" cy="16" r="2.6" fill="#9fffd8"/>
</g>
<rect class="node" x="595" y="11" width="10" height="10" fill="#00ff99" transform="rotate(45 600 16)"/>
<rect x="597.5" y="13.5" width="5" height="5" fill="#0d1117" transform="rotate(45 600 16)"/>
</svg>
