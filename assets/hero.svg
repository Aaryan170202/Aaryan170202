<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="430" viewBox="0 0 1200 430" role="img" aria-label="Terminal boot screen: Aaryan Chipkar — AI Engineer, Backend Developer, Founder at Nocaps. All systems nominal. Status: open to work.">
<title>aaryan.sys — boot sequence</title>
<defs>
  <linearGradient id="win" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#0d1117"/><stop offset="100%" stop-color="#161b22"/>
  </linearGradient>
  <linearGradient id="acc" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#00ff99"/><stop offset="100%" stop-color="#58a6ff"/>
  </linearGradient>
  <linearGradient id="scan" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#00ff99" stop-opacity="0"/>
    <stop offset="50%" stop-color="#00ff99" stop-opacity=".06"/>
    <stop offset="100%" stop-color="#00ff99" stop-opacity="0"/>
  </linearGradient>
  <linearGradient id="sheen" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#fff" stop-opacity="0"/>
    <stop offset="50%" stop-color="#9fffd8" stop-opacity=".85"/>
    <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
  </linearGradient>
  <pattern id="grid" width="26" height="26" patternUnits="userSpaceOnUse">
    <path d="M26 0H0V26" fill="none" stroke="#58a6ff" stroke-opacity=".05" stroke-width="1"/>
  </pattern>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="5" stdDeviation="8" flood-color="#000" flood-opacity=".45"/>
  </filter>
  <clipPath id="winclip"><rect x="10" y="10" width="1180" height="410" rx="16"/></clipPath>
  <clipPath id="cmdclip"><rect class="type" x="230" y="80" width="152" height="20"/></clipPath>
  <clipPath id="nameclip">
    <text x="44" y="330" class="ui" font-size="42" font-weight="700">AARYAN CHIPKAR</text>
  </clipPath>
  <style>
    .mono{font-family:ui-monospace,'Cascadia Code','JetBrains Mono','Fira Code',Consolas,'Liberation Mono',Menlo,monospace}
    .ui{font-family:'Segoe UI',system-ui,-apple-system,'Helvetica Neue',Arial,sans-serif}
    .dim{fill:#8b949e}.txt{fill:#c9d1d9}.ok{fill:#00ff99}

    .reveal{animation:fadeup .5s cubic-bezier(.2,.7,.3,1) both}
    @keyframes fadeup{from{opacity:0;transform:translateY(9px)}}
    .pop{animation:pop .12s linear both}
    @keyframes pop{from{opacity:0}}

    .type{animation:type 1.05s steps(16,end) .45s both}
    @keyframes type{from{width:0}}

    .blink{animation:blink 1s steps(1,end) infinite}
    @keyframes blink{0%,55%{opacity:1}56%,100%{opacity:0}}
    .cmdcur{animation:pop .05s linear 1.55s both,blink 1s steps(1,end) 1.6s 2,off .1s linear 3.6s forwards}
    @keyframes off{to{opacity:0}}

    .bar{animation:load 1s cubic-bezier(.3,.6,.4,1) 2.15s both}
    @keyframes load{0%{width:0}30%{width:118px}44%{width:118px}62%{width:238px}72%{width:238px}90%{width:322px}100%{width:340px}}

    .sweep{animation:sweep 6.5s ease-in-out 3.6s infinite}
    @keyframes sweep{0%{transform:translateX(0)}32%{transform:translateX(900px)}100%{transform:translateX(900px)}}

    .scanline{animation:scanmove 8s linear 4s infinite}
    @keyframes scanmove{from{transform:translateY(0)}to{transform:translateY(560px)}}

    .pulse{animation:pulse 2.2s ease-in-out infinite}
    @keyframes pulse{50%{opacity:.25}}

    @media (prefers-reduced-motion:reduce){*{animation:none!important}}
  </style>
</defs>

<!-- window -->
<rect x="10" y="10" width="1180" height="410" rx="16" fill="url(#win)" stroke="#30363d" stroke-width="1.5" filter="url(#shadow)"/>
<g clip-path="url(#winclip)">
  <rect x="10" y="10" width="1180" height="410" fill="url(#grid)"/>
  <rect class="scanline" x="10" y="-80" width="1180" height="70" fill="url(#scan)"/>
</g>

<!-- title bar -->
<line x1="10" y1="58" x2="1190" y2="58" stroke="#30363d" stroke-width="1.5"/>
<circle cx="40" cy="34" r="6.5" fill="#ff5f57"/>
<circle cx="64" cy="34" r="6.5" fill="#febc2e"/>
<circle cx="88" cy="34" r="6.5" fill="#28c840"/>
<text x="600" y="39" text-anchor="middle" class="mono dim" font-size="14">aaryan@sys: ~ — boot</text>
<text x="1160" y="39" text-anchor="end" class="mono" font-size="12" fill="#3d444d">v5.0</text>

<!-- prompt + typed command -->
<text x="44" y="94" class="mono dim" font-size="15" xml:space="preserve">guest@aaryan.sys:~$ </text>
<g clip-path="url(#cmdclip)">
  <text x="230" y="94" class="mono ok" font-size="15">./boot --verbose</text>
</g>
<rect class="cmdcur" x="378" y="81" width="9" height="17" fill="#00ff99" opacity="0"/>

<!-- boot log -->
<g class="mono" font-size="14">
  <text class="pop" style="animation-delay:1.65s" x="44" y="126" xml:space="preserve"><tspan class="ok">[ ok ]</tspan><tspan class="txt" dx="10">mounting /agents/{amore-1, amore-2, amore-net}</tspan></text>
  <text class="pop" style="animation-delay:1.8s" x="44" y="150" xml:space="preserve"><tspan class="ok">[ ok ]</tspan><tspan class="txt" dx="10">loading java · python · spring-boot · react-native</tspan></text>
  <text class="pop" style="animation-delay:1.95s" x="44" y="174" xml:space="preserve"><tspan class="ok">[ ok ]</tspan><tspan class="txt" dx="10">attaching llm runtimes — grok · qwen</tspan></text>
  <text class="pop" style="animation-delay:2.1s" x="44" y="198" xml:space="preserve"><tspan class="ok">[ ok ]</tspan><tspan class="txt" dx="10">patent module verified — published</tspan></text>
</g>

<!-- progress -->
<text x="44" y="232" class="mono dim" font-size="14">syncing aaryan.sys</text>
<rect x="230" y="221" width="340" height="12" rx="6" fill="#21262d" stroke="#30363d"/>
<rect class="bar" x="230" y="221" width="340" height="12" rx="6" fill="url(#acc)"/>
<text class="pop mono ok" style="animation-delay:3.15s" x="586" y="232" font-size="14">done ✓</text>

<!-- nominal -->
<text class="pop mono ok" style="animation-delay:3.3s" x="44" y="266" font-size="15">&gt; all systems nominal</text>
<rect class="blink" x="238" y="253" width="9" height="17" fill="#00ff99" style="animation-delay:3.3s"/>

<!-- identity -->
<g class="reveal" style="animation-delay:2.6s">
  <text x="44" y="330" class="ui" font-size="42" font-weight="700" fill="#ffffff">AARYAN CHIPKAR</text>
  <g clip-path="url(#nameclip)">
    <g class="sweep"><rect x="-300" y="292" width="220" height="50" fill="url(#sheen)" transform="skewX(-18)"/></g>
  </g>
</g>
<text class="reveal ui" style="animation-delay:2.75s" x="44" y="362" font-size="19" fill="url(#acc)">AI Engineer · Backend Developer · Founder @ Nocaps</text>
<text class="reveal mono dim" style="animation-delay:2.9s" x="44" y="390" font-size="13.5">I build systems that understand people — then ship them.</text>

<!-- status card -->
<g class="reveal" style="animation-delay:2.85s">
  <rect x="840" y="96" width="316" height="178" rx="13" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="862" y="124" class="mono dim" font-size="11.5" letter-spacing="2">SYSTEM STATUS</text>
  <circle class="pulse" cx="868" cy="148" r="4" fill="#00ff99"/>
  <text x="882" y="153" class="mono txt" font-size="13">nocaps.in — live</text>
  <circle class="pulse" style="animation-delay:.4s" cx="868" cy="174" r="4" fill="#febc2e"/>
  <text x="882" y="179" class="mono txt" font-size="13">mobile app — shipping</text>
  <circle class="pulse" style="animation-delay:.8s" cx="868" cy="200" r="4" fill="#58a6ff"/>
  <text x="882" y="205" class="mono txt" font-size="13">patent — published</text>
  <line x1="862" y1="222" x2="1134" y2="222" stroke="#30363d"/>
  <circle class="pulse" cx="868" cy="246" r="4" fill="#00ff99"/>
  <text x="882" y="251" class="mono" font-size="13" font-weight="700" fill="#00ff99">STATUS: OPEN TO WORK</text>
</g>
<text class="reveal mono" style="animation-delay:3.05s" x="840" y="300" font-size="12" fill="#8b949e">uptime: 2y+ in production · ships weekly</text>
</svg>
