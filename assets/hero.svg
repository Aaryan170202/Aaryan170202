<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="400" viewBox="0 0 1200 400" role="img" aria-label="Aaryan Chipkar — AI Engineer, Backend Developer, Founder of Nocaps">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#0d1117"/>
    <stop offset="100%" stop-color="#161b22"/>
  </linearGradient>
  <linearGradient id="acc" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#00ff99"/>
    <stop offset="100%" stop-color="#58a6ff"/>
  </linearGradient>
  <linearGradient id="glow" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#00ff99" stop-opacity="0"/>
    <stop offset="50%" stop-color="#00ff99" stop-opacity=".7"/>
    <stop offset="100%" stop-color="#58a6ff" stop-opacity="0"/>
  </linearGradient>
  <filter id="sh"><feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000" flood-opacity="0.5"/></filter>
  <style>
    .mono{font-family:'Consolas','JetBrains Mono',monospace}
    .ui{font-family:'Segoe UI',Arial,sans-serif}
    .dim{fill:#8b949e}
    .txt{fill:#c9d1d9}

    .l1,.l2,.l3,.l4{opacity:0}
    .l1{animation:in .01s linear .4s forwards}
    .l2{animation:in .01s linear 1.0s forwards}
    .l3{animation:in .01s linear 1.6s forwards}
    .l4{animation:in .01s linear 2.2s forwards}
    @keyframes in{to{opacity:1}}

    .caret{animation:blink 1s steps(1) infinite}
    @keyframes blink{0%,49%{opacity:1}50%,100%{opacity:0}}

    .name{opacity:0;animation:rise .7s ease-out 2.6s forwards}
    @keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

    .sweep{animation:sweep 4s ease-in-out infinite}
    @keyframes sweep{0%{transform:translateX(-420px)}100%{transform:translateX(1180px)}}

    .pulse{animation:pulse 2s ease-in-out infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}

    .chip{opacity:0;animation:rise .5s ease-out forwards}
    .c1{animation-delay:3.0s}.c2{animation-delay:3.15s}.c3{animation-delay:3.3s}
    .c4{animation-delay:3.45s}.c5{animation-delay:3.6s}
  </style>
</defs>

<rect width="1200" height="400" fill="#0d1117"/>
<rect x="30" y="26" width="1140" height="348" rx="18" fill="url(#bg)" stroke="#30363d" stroke-width="2" filter="url(#sh)"/>

<!-- title bar -->
<line x1="30" y1="74" x2="1170" y2="74" stroke="#30363d"/>
<circle cx="62" cy="50" r="7" fill="#ff5f57"/>
<circle cx="87" cy="50" r="7" fill="#febc2e"/>
<circle cx="112" cy="50" r="7" fill="#28c840"/>
<text x="600" y="56" text-anchor="middle" class="mono dim" font-size="15">aaryan.sys — boot sequence</text>

<!-- boot log -->
<g class="mono" font-size="15">
  <text class="l1" x="70" y="112" fill="#00ff99">&gt; initializing AARYAN OS v5.0<tspan class="dim"> ......... ok</tspan></text>
  <text class="l2" x="70" y="140" fill="#58a6ff">&gt; mounting /agents/amore-1 /amore-2 /amore-net<tspan class="dim"> ... ok</tspan></text>
  <text class="l3 txt" x="70" y="168">&gt; loading java · python · spring boot · llms<tspan class="dim"> ..... ok</tspan></text>
  <text class="l4" x="70" y="196" fill="#00ff99">&gt; all systems nominal<tspan class="caret" fill="#00ff99"> █</tspan></text>
</g>

<!-- sweep line -->
<g clip-path="none">
  <rect class="sweep" x="0" y="220" width="420" height="1.5" fill="url(#glow)"/>
</g>

<!-- identity -->
<g class="name">
  <text x="70" y="278" class="ui" font-size="46" font-weight="700" fill="#ffffff">Aaryan Chipkar</text>
  <text x="70" y="310" class="ui" font-size="20" fill="url(#acc)">AI Engineer · Backend Developer · Founder @ Nocaps</text>
  <text x="70" y="338" class="mono" font-size="15" fill="#8b949e">I build systems that understand people — then ship them.</text>
</g>

<!-- status card -->
<g class="name">
  <rect x="820" y="100" width="310" height="150" rx="14" fill="#161b22" stroke="#30363d"/>
  <text x="845" y="128" class="mono dim" font-size="13">SYSTEM STATUS</text>
  <circle class="pulse" cx="851" cy="152" r="4" fill="#00ff99"/>
  <text x="866" y="157" class="mono txt" font-size="13">nocaps.in — live</text>
  <circle class="pulse" cx="851" cy="180" r="4" fill="#febc2e"/>
  <text x="866" y="185" class="mono txt" font-size="13">mobile app — shipping</text>
  <circle class="pulse" cx="851" cy="208" r="4" fill="#58a6ff"/>
  <text x="866" y="213" class="mono txt" font-size="13">patent — published</text>
  <text x="845" y="238" class="mono" font-size="13" fill="#00ff99">STATUS : OPEN TO WORK</text>
</g>

<!-- chips -->
<g class="ui" font-size="13">
  <g class="chip c1"><rect x="820" y="272" width="86" height="28" rx="14" fill="#21262d" stroke="#30363d"/><text x="863" y="291" text-anchor="middle" fill="#c9d1d9">Java</text></g>
  <g class="chip c2"><rect x="914" y="272" width="96" height="28" rx="14" fill="#21262d" stroke="#30363d"/><text x="962" y="291" text-anchor="middle" fill="#c9d1d9">Python</text></g>
  <g class="chip c3"><rect x="1018" y="272" width="112" height="28" rx="14" fill="#21262d" stroke="#30363d"/><text x="1074" y="291" text-anchor="middle" fill="#c9d1d9">Spring Boot</text></g>
  <g class="chip c4"><rect x="820" y="308" width="132" height="28" rx="14" fill="#21262d" stroke="#30363d"/><text x="886" y="327" text-anchor="middle" fill="#c9d1d9">React Native</text></g>
  <g class="chip c5"><rect x="960" y="308" width="170" height="28" rx="14" fill="url(#acc)"/><text x="1045" y="327" text-anchor="middle" fill="#0d1117" font-weight="700">AI Agents · LLMs</text></g>
</g>

</svg>
